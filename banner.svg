<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1420"/>
      <stop offset="1" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb84d"/>
      <stop offset="1" stop-color="#79c0ff"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#16283b" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.5"/>

  <!-- terminal window -->
  <rect x="40" y="40" width="700" height="240" rx="10" fill="#0f1e2e" stroke="#22384f" stroke-width="1.5"/>
  <rect x="40" y="40" width="700" height="34" rx="10" fill="#132638"/>
  <rect x="40" y="60" width="700" height="14" fill="#132638"/>
  <circle cx="64" cy="57" r="6" fill="#ff5f56"/>
  <circle cx="84" cy="57" r="6" fill="#ffbd2e"/>
  <circle cx="104" cy="57" r="6" fill="#27c93f"/>
  <text x="400" y="61" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="13" fill="#5b7a99">ramanathan@github:~</text>

  <g font-family="Consolas, Menlo, monospace" font-size="16">
    <text x="66" y="104" fill="#7ee787">
      <tspan fill="#79c0ff">$</tspan> curl -s /api/ramanathan
    </text>

    <g opacity="0">
      <text x="66" y="136" fill="#e6edf3">{</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.3s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="90" y="164" fill="#e6edf3"><tspan fill="#79c0ff">"name"</tspan>: <tspan fill="#ffb84d">"Ramanathan S."</tspan>,</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="90" y="192" fill="#e6edf3"><tspan fill="#79c0ff">"role"</tspan>: <tspan fill="#ffb84d">"Backend &amp; Full-Stack Developer"</tspan>,</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="90" y="220" fill="#e6edf3"><tspan fill="#79c0ff">"stack"</tspan>: [<tspan fill="#ffb84d">"Java", "Spring Boot", "React", "RAG/AI"</tspan>],</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.3s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="90" y="248" fill="#e6edf3"><tspan fill="#79c0ff">"status"</tspan>: <tspan fill="#7ee787">"building..."</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="66" y="272" fill="#e6edf3">}</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.3s" fill="freeze"/>
    </g>

    <rect x="80" y="260" width="10" height="16" fill="#7ee787" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.55;0.6" begin="2.1s" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- name / role panel -->
  <text x="960" y="130" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#nameGrad)">RAMANATHAN S.</text>
  <text x="960" y="160" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#8b949e" letter-spacing="1.5">BACKEND &amp; FULL-STACK DEVELOPER</text>

  <g font-family="Consolas, Menlo, monospace" font-size="12" fill="#0a1420">
    <g opacity="0">
      <rect x="808" y="188" width="60" height="26" rx="13" fill="#ffb84d"/>
      <text x="838" y="205" text-anchor="middle">Java</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
    </g>
    <g opacity="0">
      <rect x="876" y="188" width="98" height="26" rx="13" fill="#79c0ff"/>
      <text x="925" y="205" text-anchor="middle">Spring Boot</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
    </g>
    <g opacity="0">
      <rect x="982" y="188" width="70" height="26" rx="13" fill="#7ee787"/>
      <text x="1017" y="205" text-anchor="middle">React</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
    </g>
    <g opacity="0">
      <rect x="1060" y="188" width="78" height="26" rx="13" fill="#ff9d9d"/>
      <text x="1099" y="205" text-anchor="middle">RAG / AI</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    </g>
  </g>

  <text x="960" y="250" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="13" fill="#5b7a99" opacity="0">
    Chennai, India · Open to opportunities
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.4s" fill="freeze"/>
  </text>
</svg>
